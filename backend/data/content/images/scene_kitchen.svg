<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- walls (beige) -->
  <rect x="0" y="0" width="100" height="75" fill="#fef3c7"/>
  <!-- floor -->
  <rect x="0" y="72" width="100" height="28" fill="#d6d3d1"/>
  <!-- floor tiles -->
  <line x1="0" y1="82" x2="100" y2="82" stroke="#a8a29e" stroke-width="1"/>
  <line x1="0" y1="92" x2="100" y2="92" stroke="#a8a29e" stroke-width="1"/>
  <line x1="25" y1="72" x2="25" y2="100" stroke="#a8a29e" stroke-width="1"/>
  <line x1="50" y1="72" x2="50" y2="100" stroke="#a8a29e" stroke-width="1"/>
  <line x1="75" y1="72" x2="75" y2="100" stroke="#a8a29e" stroke-width="1"/>
  <!-- window -->
  <rect x="30" y="8" width="40" height="28" rx="2" fill="#bfdbfe"/>
  <rect x="30" y="8" width="40" height="28" rx="2" fill="none" stroke="#92400e" stroke-width="2"/>
  <line x1="50" y1="8" x2="50" y2="36" stroke="#92400e" stroke-width="2"/>
  <line x1="30" y1="22" x2="70" y2="22" stroke="#92400e" stroke-width="2"/>
  <!-- sun through window -->
  <circle cx="38" cy="18" r="6" fill="#f59e0b" opacity="0.8"/>
  <!-- table -->
  <rect x="5" y="62" width="90" height="12" rx="3" fill="#92400e"/>
  <rect x="10" y="74" width="8" height="18" rx="2" fill="#78350f"/>
  <rect x="82" y="74" width="8" height="18" rx="2" fill="#78350f"/>
  <!-- pot on table -->
  <ellipse cx="30" cy="60" rx="14" ry="5" fill="#6b7280"/>
  <rect x="16" y="44" width="28" height="18" rx="3" fill="#9ca3af"/>
  <rect x="10" y="56" width="6" height="4" rx="1" fill="#6b7280"/>
  <rect x="84" y="56" width="6" height="4" rx="1" fill="#6b7280"/>
  <ellipse cx="30" cy="44" rx="14" ry="4" fill="#6b7280"/>
  <!-- cup -->
  <rect x="60" y="52" width="14" height="12" rx="2" fill="#f87171"/>
  <path d="M74 55 Q80 57 74 61" fill="none" stroke="#f87171" stroke-width="2.5"/>
  <ellipse cx="67" cy="52" rx="7" ry="3" fill="#fca5a5"/>
  <!-- Easter egg on table -->
  <ellipse cx="52" cy="58" rx="7" ry="9" fill="#fde68a"/>
  <path d="M45 57 Q52 54 59 57" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
</svg>
