<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- sky -->
  <rect x="0" y="0" width="100" height="65" fill="#bfdbfe"/>
  <!-- ground -->
  <rect x="0" y="60" width="100" height="40" fill="#34d399"/>
  <!-- rolling hill -->
  <ellipse cx="50" cy="64" rx="60" ry="16" fill="#059669"/>
  <!-- sun -->
  <circle cx="82" cy="16" r="10" fill="#f59e0b"/>
  <!-- clouds -->
  <circle cx="20" cy="18" r="8" fill="white"/>
  <circle cx="28" cy="14" r="10" fill="white"/>
  <circle cx="36" cy="18" r="8" fill="white"/>
  <circle cx="55" cy="22" r="7" fill="white"/>
  <circle cx="62" cy="18" r="9" fill="white"/>
  <circle cx="69" cy="22" r="7" fill="white"/>
  <!-- flowers left -->
  <line x1="15" y1="75" x2="15" y2="65" stroke="#34d399" stroke-width="2"/>
  <circle cx="15" cy="63" r="5" fill="#fbcfe8"/>
  <circle cx="15" cy="63" r="2.5" fill="#f59e0b"/>
  <!-- flowers middle -->
  <line x1="45" y1="78" x2="45" y2="68" stroke="#34d399" stroke-width="2"/>
  <circle cx="45" cy="66" r="5" fill="#f87171"/>
  <circle cx="45" cy="66" r="2.5" fill="#fde68a"/>
  <!-- flowers right -->
  <line x1="72" y1="76" x2="72" y2="66" stroke="#34d399" stroke-width="2"/>
  <circle cx="72" cy="64" r="5" fill="#a78bfa"/>
  <circle cx="72" cy="64" r="2.5" fill="#fde68a"/>
  <!-- butterfly -->
  <ellipse cx="58" cy="55" rx="6" ry="4" fill="#f87171" transform="rotate(-20 58 55)"/>
  <ellipse cx="66" cy="55" rx="6" ry="4" fill="#f87171" transform="rotate(20 66 55)"/>
  <ellipse cx="60" cy="58" rx="4" ry="3" fill="#f59e0b" transform="rotate(15 60 58)"/>
  <ellipse cx="64" cy="58" rx="4" ry="3" fill="#f59e0b" transform="rotate(-15 64 58)"/>
  <ellipse cx="62" cy="56" rx="1.5" ry="5" fill="#1e293b"/>
</svg>
