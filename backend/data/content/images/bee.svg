<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- wings -->
  <ellipse cx="36" cy="38" rx="18" ry="10" fill="#60a5fa" opacity="0.7" transform="rotate(-20 36 38)"/>
  <ellipse cx="64" cy="38" rx="18" ry="10" fill="#60a5fa" opacity="0.7" transform="rotate(20 64 38)"/>
  <!-- body -->
  <ellipse cx="50" cy="58" rx="18" ry="26" fill="#f59e0b"/>
  <!-- stripes -->
  <rect x="32" y="50" width="36" height="7" rx="2" fill="#1e293b"/>
  <rect x="32" y="63" width="36" height="7" rx="2" fill="#1e293b"/>
  <!-- head -->
  <circle cx="50" cy="32" r="14" fill="#f59e0b"/>
  <!-- eyes -->
  <circle cx="44" cy="30" r="3" fill="#1e293b"/>
  <circle cx="56" cy="30" r="3" fill="#1e293b"/>
  <circle cx="43" cy="29" r="1" fill="white"/>
  <circle cx="55" cy="29" r="1" fill="white"/>
  <!-- antennae -->
  <line x1="46" y1="18" x2="40" y2="8" stroke="#1e293b" stroke-width="2"/>
  <line x1="54" y1="18" x2="60" y2="8" stroke="#1e293b" stroke-width="2"/>
  <circle cx="40" cy="7" r="3" fill="#f59e0b"/>
  <circle cx="60" cy="7" r="3" fill="#f59e0b"/>
  <!-- stinger -->
  <polygon points="50,84 46,92 54,92" fill="#92400e"/>
</svg>
