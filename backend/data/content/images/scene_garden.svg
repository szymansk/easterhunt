<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- sky -->
  <rect x="0" y="0" width="100" height="62" fill="#bfdbfe"/>
  <!-- ground -->
  <rect x="0" y="58" width="100" height="42" fill="#34d399"/>
  <!-- soil patches -->
  <ellipse cx="25" cy="68" rx="14" ry="6" fill="#92400e"/>
  <ellipse cx="75" cy="68" rx="14" ry="6" fill="#92400e"/>
  <!-- fence posts -->
  <rect x="4" y="48" width="6" height="24" rx="1" fill="#d97706"/>
  <polygon points="4,48 7,42 10,48" fill="#d97706"/>
  <rect x="18" y="48" width="6" height="24" rx="1" fill="#d97706"/>
  <polygon points="18,48 21,42 24,48" fill="#d97706"/>
  <rect x="76" y="48" width="6" height="24" rx="1" fill="#d97706"/>
  <polygon points="76,48 79,42 82,48" fill="#d97706"/>
  <rect x="90" y="48" width="6" height="24" rx="1" fill="#d97706"/>
  <polygon points="90,48 93,42 96,48" fill="#d97706"/>
  <!-- fence rails -->
  <rect x="4" y="53" width="86" height="4" rx="2" fill="#f59e0b"/>
  <rect x="4" y="63" width="86" height="4" rx="2" fill="#f59e0b"/>
  <!-- clouds -->
  <circle cx="22" cy="14" r="8" fill="white"/>
  <circle cx="30" cy="10" r="10" fill="white"/>
  <circle cx="38" cy="14" r="8" fill="white"/>
  <!-- plants left soil -->
  <line x1="19" y1="68" x2="19" y2="55" stroke="#34d399" stroke-width="2.5"/>
  <ellipse cx="19" cy="53" rx="6" ry="8" fill="#34d399"/>
  <line x1="26" y1="66" x2="26" y2="56" stroke="#34d399" stroke-width="2"/>
  <circle cx="26" cy="54" r="4" fill="#059669"/>
  <line x1="32" y1="68" x2="32" y2="56" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="32" cy="54" rx="5" ry="7" fill="#34d399"/>
  <!-- plants right soil -->
  <line x1="68" y1="68" x2="68" y2="55" stroke="#34d399" stroke-width="2.5"/>
  <ellipse cx="68" cy="53" rx="6" ry="8" fill="#34d399"/>
  <line x1="76" y1="66" x2="76" y2="56" stroke="#34d399" stroke-width="2"/>
  <circle cx="76" cy="54" r="4" fill="#059669"/>
  <!-- flower center garden -->
  <line x1="50" y1="82" x2="50" y2="60" stroke="#34d399" stroke-width="3"/>
  <circle cx="50" cy="56" r="10" fill="#f87171"/>
  <circle cx="50" cy="56" r="5" fill="#fde68a"/>
  <!-- Easter egg in garden -->
  <ellipse cx="50" cy="78" rx="6" ry="8" fill="#a78bfa"/>
  <path d="M44 77 Q50 74 56 77" fill="none" stroke="#fde68a" stroke-width="1.5"/>
  <!-- sun -->
  <circle cx="80" cy="14" r="10" fill="#f59e0b"/>
  <line x1="80" y1="2" x2="80" y2="6" stroke="#f59e0b" stroke-width="2"/>
  <line x1="92" y1="14" x2="96" y2="14" stroke="#f59e0b" stroke-width="2"/>
  <line x1="89" y1="6" x2="92" y2="3" stroke="#f59e0b" stroke-width="2"/>
</svg>
