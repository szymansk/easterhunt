<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- upper wings -->
  <ellipse cx="30" cy="38" rx="22" ry="16" fill="#a78bfa" transform="rotate(-30 30 38)"/>
  <ellipse cx="70" cy="38" rx="22" ry="16" fill="#f87171" transform="rotate(30 70 38)"/>
  <!-- lower wings -->
  <ellipse cx="28" cy="62" rx="16" ry="12" fill="#a78bfa" transform="rotate(20 28 62)"/>
  <ellipse cx="72" cy="62" rx="16" ry="12" fill="#f87171" transform="rotate(-20 72 62)"/>
  <!-- wing patterns -->
  <circle cx="32" cy="38" r="5" fill="#fde68a" opacity="0.7"/>
  <circle cx="68" cy="38" r="5" fill="#fde68a" opacity="0.7"/>
  <!-- body -->
  <ellipse cx="50" cy="50" rx="4" ry="18" fill="#1e293b"/>
  <!-- antennae -->
  <line x1="50" y1="32" x2="38" y2="16" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="50" y1="32" x2="62" y2="16" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="38" cy="16" r="2.5" fill="#1e293b"/>
  <circle cx="62" cy="16" r="2.5" fill="#1e293b"/>
</svg>
